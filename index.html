<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Miss Usha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ff003c,#ff4d6d,#ff758f);
min-height:100vh;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
width:90%;
max-width:700px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
padding:30px;
border-radius:25px;
box-shadow:0 0 30px rgba(255,255,255,.3);
z-index:10;
}

h1{
font-family:'Great Vibes',cursive;
font-size:3rem;
margin-bottom:10px;
}

h2{
margin:15px 0;
}

p{
margin:10px 0;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
margin:10px;
font-size:16px;
cursor:pointer;
background:white;
color:#ff003c;
font-weight:bold;
}

textarea{
width:100%;
padding:10px;
border-radius:15px;
border:none;
margin-top:10px;
}

.hidden{
display:none;
}

.heart{
position:absolute;
font-size:25px;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-100px);
opacity:1;
}
}

.fireworks{
font-size:100px;
animation:pop 1s infinite;
}

@keyframes pop{
50%{transform:scale(1.2);}
}

img{
width:120px;
margin:10px;
border-radius:15px;
}
</style>
</head>
<body>

<!-- Romantic BGM -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div id="page1">
<h1>Hello Ms Usha Singh Shekhawat ❤️</h1>

<p style="font-size:24px;">
In Your Service <br><b>Akash Dhanraj</b>
</p>

<div>
<img src="https://cdn.pixabay.com/photo/2016/03/31/19/14/teddy-bear-1294961_1280.png">
<img src="https://cdn.pixabay.com/photo/2016/11/18/15/44/rose-1836884_1280.jpg">
</div>

<button onclick="next(2)">Continue ❤️</button>
</div>

<div id="page2" class="hidden">
<h2>Abi Aapki Tabiyat Kesi Hai?</h2>

<button onclick="saveHealth('Fine')">Fine 😊</button>
<button onclick="saveHealth('Feel Low')">Feel Low 😔</button>
</div>

<div id="page3" class="hidden">
<h2>Aap Mujhse Kab Milna Chahogi?</h2>

<button onclick="saveMeet('26th On Movie')">26th On Movie 🎬</button>
<button onclick="saveMeet('27th Weekend')">27th Weekend ❤️</button>
</div>

<div id="page4" class="hidden">
<h2>Do You Love Me Miss Usha? ❤️</h2>

<button onclick="loveAns('Yes')">Yes 💖</button>
<button onclick="loveAns('No')">No 😢</button>
</div>

<div id="page5" class="hidden">
<div id="celebrate"></div>

<h2>Why Do You Love Me And Like Me?</h2>

<textarea id="reason" rows="5"
placeholder="Write here..."></textarea>

<br>
<button onclick="showSummary()">Submit ❤️</button>
</div>

<div id="summary" class="hidden">
<h2>Love Summary 💖</h2>

<p id="result"></p>

<h1 style="font-size:2.5rem;">
Usha Singh Shekhawat ❤️
</h1>

<p style="font-size:22px;">
I Love You So Much 💖<br>
Your Akash ❤️<br><br>
Get Well Soon 🌹
</p>
</div>

</div>

<script>

let answers={};

function next(n){
document.querySelectorAll('.container > div')
.forEach(x=>x.classList.add('hidden'));

document.getElementById('page'+n)
.classList.remove('hidden');
}

function saveHealth(v){
answers.health=v;
next(3);
}

function saveMeet(v){
answers.meet=v;
next(4);
}

function loveAns(v){
answers.love=v;

next(5);

if(v==="Yes"){
document.getElementById("celebrate").innerHTML=
`
<div class="fireworks">🎆🎇🎆🎇</div>
<div style="font-size:150px;">😘</div>
`;
}
}

function showSummary(){

answers.reason=
document.getElementById("reason").value;

document.querySelectorAll('.container > div')
.forEach(x=>x.classList.add('hidden'));

document.getElementById("summary")
.classList.remove('hidden');

document.getElementById("result").innerHTML=
`
💖 Health Status: ${answers.health}<br><br>
🎬 Meeting Plan: ${answers.meet}<br><br>
❤️ Love Answer: ${answers.love}<br><br>
💌 Reason:<br>${answers.reason}
`;
}

function createHeart(){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML=["❤️","💖","💕","🌹","😘"][Math.floor(Math.random()*5)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
